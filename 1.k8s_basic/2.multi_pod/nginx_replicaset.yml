apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  namespace: tony-ns
spec:
  replicas: 2
  # 아래의 라벨은 replicaset이 관리해야할 파드를 결정하는데 사용.
  selector:
    matchLabels:
      app: my-nginx
  template:
  # 아래의 label은 service에서 라우팅할 대상이 되는 label. service의 selector.app과 일치해야함.
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
# 클러스터 내에서 service명은 url주소(엔드포인트)로 사용. ex) http://my-service:포트번호
  name: my-service
  namespace: tony-ns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: my-nginx